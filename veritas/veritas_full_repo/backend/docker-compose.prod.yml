
version: '3.9'
services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '7000:7000'
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: node:20-alpine
    working_dir: /frontend
    command: sh -c "mkdir -p /frontend_dist && cp -r /frontend/* /frontend_dist/ 2>/dev/null || true && tail -f /dev/null"
    volumes:
      - frontend_dist:/frontend_dist
    restart: unless-stopped

  backend:
    build: .
    command: bash ./deploy/api-entrypoint.sh
    restart: unless-stopped
    expose:
      - '6000'
    env_file:
      - .env.production
    volumes:
      - ./:/app
      - veritas_artifacts:/app/var/veritas_artifacts
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c "import urllib.request; urllib.request.urlopen('http://localhost:6000/api/v1/health').read()""]
      interval: 30s
      timeout: 10s
      retries: 5

  worker:
    build: .
    command: bash ./deploy/worker-entrypoint.sh
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - ./:/app
      - veritas_artifacts:/app/var/veritas_artifacts
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '5002:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: ai_biomarkers
    ports:
      - '5001:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d ai_biomarkers"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  veritas_artifacts:
  frontend_dist:
