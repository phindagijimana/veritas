version: "3.9"
services:
  backend:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 6000 --reload
    ports:
      - "6000:6000"
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      - redis
      - postgres

  worker:
    build: .
    command: rq worker ai-biomarkers
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      - redis
      - postgres

  frontend:
    image: node:20-alpine
    working_dir: /frontend
    command: sh -c "echo 'Mount your frontend here and run npm run dev -- --port 7000' && tail -f /dev/null"
    ports:
      - "7000:7000"

  redis:
    image: redis:7
    ports:
      - "5002:6379"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: ai_biomarkers
    ports:
      - "5001:5432"

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "5005:9090"
    depends_on:
      - backend
