# Local PostgreSQL, Redis (Celery broker), and MinIO (optional S3) for Veritas.
# Redis: host port 6380 -> container 6379 (Atlas/other stacks often use 6379 on host).
# MinIO: API 9002, console 9003 (avoid clashing with Atlas MinIO on 9000/9001).
# Usage: docker compose up -d
# Default DATABASE_URL: postgresql+psycopg://veritas:veritas@127.0.0.1:5432/veritas_dev
# Pytest uses database veritas_test (see docker/initdb).

services:
  postgres:
    image: docker.io/library/postgres:15-alpine
    environment:
      POSTGRES_USER: veritas
      POSTGRES_PASSWORD: veritas
      POSTGRES_DB: veritas_dev
    ports:
      - "5433:5432"
    volumes:
      - veritas_pg_data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veritas -d veritas_dev"]
      interval: 3s
      timeout: 5s
      retries: 10

  redis:
    image: docker.io/library/redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - veritas_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio:
    image: docker.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: veritasminio
      MINIO_ROOT_PASSWORD: veritasminio-secret
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - veritas_minio_data:/data

volumes:
  veritas_pg_data:
  veritas_redis_data:
  veritas_minio_data:
