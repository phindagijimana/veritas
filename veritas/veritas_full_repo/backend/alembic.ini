[alembic]
script_location = alembic
# Overridden by alembic/env.py from DATABASE_URL / app settings; default matches docker-compose.
sqlalchemy.url = postgresql+psycopg://veritas:veritas@127.0.0.1:5433/veritas_dev

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
